resolver 127.0.0.11 valid=10s;

upstream webapp_backend {
    server webapp-1:5000 max_fails=2 fail_timeout=5s;
    server webapp-2:5000 backup;
}

server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name _;
    ssl_certificate /etc/nginx/certs/infralab.crt;
    ssl_certificate_key /etc/nginx/certs/infralab.key;

    add_header Cache-Control 'no-store, no-cache';

    # --- Grafana ---
    location /grafana/ {
        set $grafana http://grafana:3000;
        proxy_pass $grafana$request_uri;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /grafana/api/live/ {
        set $grafana http://grafana:3000;
        proxy_pass $grafana$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Proto https;
    }

    # --- Prometheus ---
    location /prometheus/ {
        set $prometheus http://prometheus:9090;
        proxy_pass $prometheus$request_uri;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # --- Alertmanager ---
    location /alertmanager/ {
        set $alertmanager http://alertmanager:9093;
        proxy_pass $alertmanager$request_uri;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # --- MailHog CSS/JS/Images ---
    location ~ ^/mailhog/css/(.+)$ {
        set $mailhog http://mailhog:8025;
        proxy_pass $mailhog/mailhog/css/$1;
        proxy_hide_header Content-Type;
        add_header Content-Type "text/css";
    }

    location ~ ^/mailhog/js/(.+)$ {
        set $mailhog http://mailhog:8025;
        proxy_pass $mailhog/mailhog/js/$1;
        proxy_hide_header Content-Type;
        add_header Content-Type "application/javascript";
    }

    location ~ ^/mailhog/images/(.+)$ {
        set $mailhog http://mailhog:8025;
        proxy_pass $mailhog/mailhog/images/$1;
        proxy_hide_header Content-Type;
        add_header Content-Type "image/png";
    }

    # --- MailHog API ---
    location /mailhog/api/ {
        set $mailhog http://mailhog:8025;
        proxy_pass $mailhog/mailhog/api/;
        proxy_set_header Host $http_host;
    }

    # --- MailHog page ---
    location /mailhog/ {
        set $mailhog http://mailhog:8025;
        proxy_pass $mailhog/mailhog/;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # --- App avec failover ---
    location / {
        proxy_pass http://webapp_backend;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_next_upstream error timeout http_502 http_503;
        proxy_connect_timeout 3s;
    }
}
