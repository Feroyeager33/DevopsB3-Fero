upstream webapp_pool {
    server webapp-1:5000 max_fails=3 fail_timeout=30s;
    server webapp-2:5000 max_fails=3 fail_timeout=30s;
}

server {
    listen 80;
    server_name _;

    # Healthcheck Nginx
    location /nginx-health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Métriques Nginx pour Prometheus
    location /nginx-status {
        stub_status on;
        access_log off;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        allow 10.0.0.0/8;
        deny all;
    }

    # Application (load balanced)
    location / {
        proxy_pass http://webapp_pool;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header X-Upstream-Server $upstream_addr;
    }

    # Grafana — GF_SERVER_SERVE_FROM_SUB_PATH=true donc Grafana gère /grafana lui-même
    location /grafana {
        proxy_pass http://grafana:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Prometheus — --web.route-prefix=/prometheus/ donc il gère /prometheus lui-même
    location /prometheus {
        proxy_pass http://prometheus:9090;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Alertmanager — --web.route-prefix=/alertmanager/ donc il gère /alertmanager lui-même
    location /alertmanager {
        proxy_pass http://alertmanager:9093;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
