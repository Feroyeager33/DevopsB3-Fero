# docker-compose.yml
name: infralab

include:
  - path: ./postgres/docker-compose.yml
  - path: ./monitoring/docker-compose.yml
  - path: ./app/docker-compose.yml

services:
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./certs:/etc/nginx/certs:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - webapp-1
      - webapp-2
      - grafana
      - prometheus
    networks:
      - frontend
      - monitoring
    restart: unless-stopped

networks:
  frontend:
    name: frontend
    driver: bridge
  backend:
    name: backend
    driver: bridge
  monitoring:
    name: monitoring
    driver: bridge
