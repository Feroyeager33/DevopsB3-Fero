version: '3.8'

services:
  grafana:
    image: grafana/grafana:10.2.0
    container_name: grafana
    ports:
      - "8080:3000"
      - "6981:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=GrafanaPass!
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - frontend
      - monitoring
    restart: unless-stopped
    mem_limit: 256m
