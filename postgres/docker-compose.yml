services:
  postgres-primary:
    build:
      context: ./primary
      dockerfile: Dockerfile
    container_name: postgres-primary
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    command: 'postgres -c wal_level=replica -c max_wal_senders=3 -c max_replication_slots=3 -c hot_standby=on -c listen_addresses=''*'''
    volumes:
      - postgres_primary_data:/var/lib/postgresql/data
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-replica:
    build:
      context: ./replica
      dockerfile: Dockerfile
    container_name: postgres-replica
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_REPLICATION_USER=${POSTGRES_REPLICATION_USER}
      - POSTGRES_REPLICATION_PASSWORD=${POSTGRES_REPLICATION_PASSWORD}
    depends_on:
      postgres-primary:
        condition: service_healthy
    volumes:
      - postgres_replica_data:/var/lib/postgresql/data
    networks:
      - backend
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: redis
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3

  mailhog:
    image: mailhog/mailhog:latest
    container_name: mailhog
    # Note: On garde le port 8025 pour l'interface web si tu veux y accéder direct, 
    # mais Nginx s'en occupera aussi.
    ports:
      - "8025:8025"
    networks:
      - backend
      - monitoring
    restart: unless-stopped

networks:
  backend:
    external: true
  monitoring:
    external: true

volumes:
  postgres_primary_data:
  postgres_replica_data:
  redis_data:
